name: Lint & Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run Bash Format Check
        run: mise run check-fmt:bash
      - name: Run Bash Lint
        run: mise run lint:bash
