[tools]
shellcheck = "latest"
shfmt = "latest"

[tasks."lint:bash"]
description = "Lint all Bash scripts using shellcheck"
run = "shellcheck install cleanup_legacy.sh install-conf/*.sh"

[tasks."fmt:bash"]
description = "Format all Bash scripts using shfmt"
run = "shfmt -w -i 4 install cleanup_legacy.sh install-conf/*.sh"

[tasks."check-fmt:bash"]
description = "Check if Bash scripts are formatted correctly"
run = "shfmt -d -i 4 install cleanup_legacy.sh install-conf/*.sh"

[tasks."lint"]
description = "Run all linters"
depends = ["lint:bash"]

[tasks."fmt"]
description = "Run all formatters"
depends = ["fmt:bash"]
