[tools]
actionlint = "latest"
jq = "latest"
neovim = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
yq = "latest"

# Shell scripts are auto-collected by `shfmt -f`, which detects them via shebang —
# so extensionless scripts (install/update/fetch) are caught without a hand-kept list.
# `shfmt -f` walks the filesystem and ignores .gitignore, so prune third-party code it
# would otherwise descend into: git submodules (modules/), vendored vim plugins, and
# zsh dotfiles (config/zsh/, incl. the generated p10k.zsh) — shfmt parses sh/bash, not zsh —
# and bin/ (vendored third-party tools like checksec, not style-managed here).
[tasks."lint:bash"]
description = "Lint all Bash scripts using shellcheck"
run = "shfmt -f . | grep -vE '^(modules|config/vim/plugged|config/zsh|bin)/' | xargs shellcheck"

[tasks."fmt:bash"]
description = "Format all Bash scripts using shfmt"
run = "shfmt -f . | grep -vE '^(modules|config/vim/plugged|config/zsh|bin)/' | xargs shfmt -w -i 4"

[tasks."check-fmt:bash"]
description = "Check if Bash scripts are formatted correctly"
run = "shfmt -f . | grep -vE '^(modules|config/vim/plugged|config/zsh|bin)/' | xargs shfmt -d -i 4"

# No shellcheck equivalent exists for zsh; `zsh -n` does a parse-only syntax check.
[tasks."lint:zsh"]
description = "Syntax-check all zsh files using zsh -n"
run = "for f in config/zsh/*; do zsh -n \"$f\"; done"

[tasks."lint:github-actions"]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks."lint:json"]
# Antigravity uses JSONC syntax in .json files, so strict JSON lint excludes it.
description = "Validate tracked strict JSON files"
run = "git ls-files '*.json' | grep -vE '^config/Antigravity/' | xargs jq empty"

[tasks."lint:yaml"]
description = "Validate tracked YAML files"
run = "git ls-files '*.yaml' '*.yml' | xargs yq eval '.' >/dev/null"

# A dotbot link entry pointing at a deleted/renamed config/ source silently
# breaks `install` (the failure only surfaces at link time). Assert every link
# source path exists. `.value.path // .value` handles both map and string forms.
[tasks."lint:dotbot"]
description = "Verify every dotbot link source path exists"
run = '''
missing=$(yq eval '.[] | select(has("link")) | .link | to_entries | .[] | (.value.path // .value)' install-conf/dotbot.conf.yaml | while IFS= read -r p; do [ -n "$p" ] && [ ! -e "$p" ] && printf '%s\n' "$p"; done) || true
if [ -n "$missing" ]; then printf 'dotbot link sources missing:\n%s\n' "$missing" >&2; exit 1; fi
'''

# stylua is the de-facto Lua formatter; settings live in stylua.toml so the
# editor and CI agree. Only init.lua is hand-written Lua (the pack lock is JSON).
[tasks."fmt:lua"]
description = "Format all Lua files using stylua"
run = "git ls-files '*.lua' | xargs stylua"

[tasks."check-fmt:lua"]
description = "Check if Lua files are formatted correctly"
run = "git ls-files '*.lua' | xargs stylua --check"

# Headless load test for the Neovim config: the analog of `zsh -n`. nvim exits 0
# even when init.lua errors during startup, so load it through pcall(dofile) and
# force a non-zero exit on failure. `set noloadplugins` keeps it offline and
# independent of installed plugin state; --clean avoids the user's real config.
[tasks."lint:nvim"]
description = "Headless load-check the Neovim config (init.lua)"
run = '''
tmpdir="${TMPDIR:-$(mktemp -d)}"
XDG_DATA_HOME="$tmpdir/nvim-data" \
XDG_STATE_HOME="$tmpdir/nvim-state" \
XDG_CACHE_HOME="$tmpdir/nvim-cache" \
nvim --headless --clean -n --cmd 'set noloadplugins' --cmd 'set shada=' -c "lua local ok, err = pcall(dofile, 'config/nvim/init.lua'); if not ok then io.stderr:write(tostring(err) .. '\n'); os.exit(1) end; os.exit(0)"
'''

[tasks."lint"]
description = "Run all linters"
depends = ["lint:bash", "lint:zsh", "lint:github-actions", "lint:json", "lint:yaml", "lint:dotbot", "lint:nvim"]

[tasks."fmt"]
description = "Run all formatters"
depends = ["fmt:bash", "fmt:lua"]

[tasks."check-fmt"]
description = "Check all formatters"
depends = ["check-fmt:bash", "check-fmt:lua"]

[tasks."check"]
description = "Run all checks (file keep unchanged)"
depends = ["lint", "check-fmt"]
