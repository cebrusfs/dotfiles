#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Meng-Huan Yu"
email = "2252236+cebrusfs@users.noreply.github.com"

[ui]
default-command = "log"

# Output git-format diffs so that `delta` can properly parse and style them
diff-formatter = ":git"

# As of jj v0.36.0, the $PAGER environment variable is ignored.
# The pager must be explicitly configured here to use 'delta'.
pager = "delta"

# Editors
diff-editor = ":builtin"

# Used for 3-way merge conflict resolution (e.g., `jj resolve`)
merge-editor = "vimdiff"
show-cryptographic-signatures = true

[git]
# Prevent upload
private-commits = 'blacklist()'

# Sign on push (works with behavior = "drop"). Off by default: this is the only line
# that actually attempts signing, and jj hard-fails the push when no key is reachable.
# Enable it per-machine (where a local or forwarded key is available) as a local,
# uncommitted toggle.
# sign-on-push = true

# Do not auto-track every remote bookmark. `jj pull` fetches all remotes so
# deleted remote bookmarks are observed, while PR/topic branches stay untracked
# until explicitly adopted with `jj bookmark track`.

[aliases]
blame = ["file", "annotate"]
bl = ["blame"]

# `git pull --rebase` equivalent: fetch, then replant every local stack onto the
# updated trunk in one shot. jj has no built-in fetch+rebase, so this composes the
# two steps. `roots(trunk()..mutable())` (built-in `mutable()`/`trunk()`, inlined to
# avoid a custom revset) picks each stack's root; `-s` carries descendants so
# stacked work stays intact; `--skip-emptied` drops commits already merged upstream.
pull = ["util", "exec", "--", "bash", "-c", """
set -e
jj git fetch --all-remotes
jj rebase --skip-emptied --onto 'trunk()' --source 'roots(trunk()..mutable())'
"""]

[revset-aliases]
# Private and WIP commits that should never be pushed anywhere. Often part of
# work-in-progress merge stacks.
'wip()' = 'description(glob:"wip:*")'
'private()' = 'description(glob:"private:*") | description(glob:"DO.?NOT.?SUBMIT:*")'
'blacklist()' = 'wip() | private()'

[template-aliases]
diff_counts = "self.diff().summary()"

[signing]
# Embedded (not a .pub path) so remote hosts need no key file: ssh-keygen finds the
# private half in the forwarded ssh-agent, so signing works over `ForwardAgent yes`.
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMysomNRNnZ9+FjuCQKw6rkoulTLUxGJtzAJ09DWx4MQ"
backends.ssh.allowed-signers = "~/.config/git/allowed_signers"

# Enable signing
backend = "ssh"
behavior = "drop"
