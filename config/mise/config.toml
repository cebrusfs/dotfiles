[tools]

#
# Default dev tools
#

fzf = "latest"
ripgrep = "latest"
fd = "latest"
delta = "latest"
neovim = "latest"

# JS
node = "latest"
bun = "latest"

# Rust
rust = "latest"

# Ruby
ruby = "latest"

# Python
uv = "latest"

# git/config sets filter.lfs.required=true, so this must exist
git-lfs = "latest"

# Agent CLI
claude-code = "latest"
codex = "latest"
"npm:@google/gemini-cli" = "latest"

[settings]
minimum_release_age = "7d"
minimum_release_age_excludes = []

[settings.npm]
bun = true
package_manager = "bun"

[settings.ruby]
compile = false
