# vim: shiftwidth=4 tabstop=4:
- defaults:
    create:
        mode: 0755
    link:
        relink: true
        create: true
    shell:
        stdout: true
        stderr: true
    clean:
        force: true

# Cleanup broken links
- clean: ["~", "~/.ssh", "~/.irssi", "~/.config"]

- shell:
    - [git submodule update --init --recursive, "Installing submodules"]

- create:
    ~/.agents:
    ~/.claude:
    ~/.codex:
    ~/.config/mise:
    ~/.gemini/config:
    ~/working:

- shell:
    # Dotbot create entries do not support `if`; keep this macOS-only directory
    # as a quiet shell no-op on other platforms.
    - command: 'case "$(uname -s)" in Darwin) mkdir -p "$HOME/Applications" ;; esac'
      quiet: true

- link:
    # tmux
    ~/.tmux.conf: config/tmux/tmux.conf

    # irc
    ~/.irssi/default.theme: config/irssi/default.theme
    ~/.irssi/config: config/irssi/config
    ~/.irssi/scripts: config/irssi/scripts
    ~/.irssi/gen_client_cert.sh: config/irssi/gen_client_cert.sh

    # pandoc
    ~/.pandoc: config/pandoc

    # zsh
    ~/.zshenv: config/zsh/zshenv
    ~/.zprofile: config/zsh/zprofile
    ~/.zpreztorc: config/zsh/zpreztorc
    ~/.zshrc: config/zsh/zshrc
    ~/.zlogin: config/zsh/zlogin
    ~/.zlogout: config/zsh/zlogout
    ~/.p10k.zsh: config/zsh/p10k.zsh

    # fish
    # Keep ~/.config/fish itself as fish runtime state so fish_variables stays
    # local and untracked; only symlink repo-managed config artifacts.
    #~/.config/fish/config.fish:
    #    path: config/fish/config.fish
    #~/.config/fish/functions:
    #    path: config/fish/functions

    # starship
    ~/.config/starship.toml:
        path: config/starship/starship.toml
        force: true
        backup: true

    # mise
    ~/.config/mise/config.toml: config/mise/config.toml
    ~/.config/mise/config.local.toml:
        path: config/mise/config.linux.local.toml
        if: '[[ "$OSTYPE" == linux* ]] && ! [[ -f /etc/glinux_version ]] && ! grep -q "go/glinux" /etc/os-release 2>/dev/null'

    # bun
    ~/.bunfig.toml: config/bunfig.toml

    # jj
    ~/.config/jj: config/jj

    # git
    ~/.config/git: config/git

    # ssh
    ~/.ssh/config: config/ssh/config
    ~/.ssh/authorized_keys: config/ssh/authorized_keys

    # agents
    # Codex stores config/state in ~/.codex, while Codex and Gemini CLI
    # discover user Agent Skills from ~/.agents/skills.
    ~/.claude/CLAUDE.md:
        path: config/agent/global.md
        force: true
        backup: true
    ~/.claude/settings.json: config/agent/claude/settings.json
    ~/.claude/rules: config/agent/rules
    ~/.claude/skills: config/agent/skills
    ~/.codex/AGENTS.md: config/agent/global.md
    ~/.codex/hooks.json: config/agent/codex/hooks.json
    ~/.codex/rules/agent.rules: config/agent/codex/rules/agent.rules
    ~/.agents/skills: config/agent/skills
    ~/.gemini/config/hooks: config/agent/hooks


# vim
- link:
    ~/.vim: config/vim
    # lint configs
    ~/.rubocop.yml: config/vim/lint-config/rubocop.yml
- create:
    ~/.vimfiles/backup:
        mode: 0700
    ~/.vimfiles/swap:
        mode: 0700
    ~/.vimfiles/undo:
        mode: 0700

# nvim
- link:
    ~/.config/nvim: config/vim
    ~/.local/share/nvim/site/autoload/plug.vim: config/vim/autoload/plug.vim

# Linux specific links
- link:
    ~/bin:
        path: bin/x86_64
        if: '[[ "$OSTYPE" == linux* ]]'
    ~/.fonts.conf:
        path: config/fonts.conf
        if: '[[ "$OSTYPE" == linux* ]]'

# OSX specific links
- link:
    ~/bin:
        path: bin/osx
        if: '[[ "$OSTYPE" == darwin* ]]'

    # Antigravity
    ~/Library/Application Support/Antigravity/User/settings.json:
        path: config/Antigravity/settings.json
        if: '[[ "$OSTYPE" == darwin* ]]'
    ~/Library/Application Support/Antigravity/User/keybindings.json:
        path: config/Antigravity/keybindings.json
        if: '[[ "$OSTYPE" == darwin* ]]'

    # ~/.config/karabiner:
        # path: config/karabiner
        # if: '[[ "$OSTYPE" == darwin* ]]'

    # ~/.btt_autoload_preset.json:
        # path: config/BetterTouchTool.bttpreset
        # if: '[[ "$OSTYPE" == darwin* ]]'
